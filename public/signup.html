<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tally AI - Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d14; --surface: #13131f; --surface2: #1a1a2e;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
      --text: #f0eeff; --text2: #c4c0e0; --text3: #6b6888;
      --primary: #7c6ef8; --gold: #f4b942; --danger: #ff6b6b;
      --radius: 14px; --radius-sm: 10px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(124,110,248,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(244,185,66,0.04) 0%, transparent 50%);
    }
    .card {
      width: 100%; max-width: 420px; margin: 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }
    .logo { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 32px; }
    .logo-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--gold));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; box-shadow: 0 8px 24px rgba(124,110,248,0.35);
    }
    .logo-name { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    .logo-tagline { font-size: 0.8rem; color: var(--text3); }
    h2 { font-size: 1.05rem; font-weight: 600; margin-bottom: 24px; color: var(--text2); text-align: center; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text3); margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .field input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text);
      font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s; outline: none;
    }
    .field input:focus { border-color: var(--primary); }
    .field input.has-toggle { padding-right: 48px; }
    .toggle-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text3); cursor: pointer;
      font-size: 0.75rem; font-family: inherit; padding: 4px;
    }
    .toggle-btn:hover { color: var(--text2); }
    .submit-btn {
      width: 100%; padding: 13px; border-radius: var(--radius-sm); border: none;
      background: var(--primary); color: #fff; font-size: 0.95rem;
      font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px;
    }
    .submit-btn:hover { background: #6a5de0; }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3);
      border-radius: var(--radius-sm); padding: 10px 14px;
      font-size: 0.82rem; color: var(--danger); margin-bottom: 16px; display: none;
    }
    .error.show { display: block; }
    .hint { margin-top: 20px; text-align: center; font-size: 0.75rem; color: var(--text3); line-height: 1.6; }
    .hint a { color: var(--gold); text-decoration: none; font-weight: 700; }
    .hint a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">*</div>
      <div class="logo-name">Tally AI</div>
      <div class="logo-tagline">Smart Financial Management</div>
    </div>

    <h2>Create your account</h2>
    <div class="error" id="error-msg"></div>

    <form id="signup-form" autocomplete="on">
      <div class="field">
        <label for="name">Display name</label>
        <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name">
      </div>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="Choose a password" class="has-toggle" autocomplete="new-password" required>
          <button type="button" class="toggle-btn" id="toggle-pw">Show</button>
        </div>
      </div>
      <button type="submit" class="submit-btn" id="submit-btn">Create Account</button>
    </form>

    <div class="hint">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>

  <script>
    document.getElementById('toggle-pw').onclick = function() {
      const input = document.getElementById('password');
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      this.textContent = showing ? 'Show' : 'Hide';
    };

    document.getElementById('signup-form').onsubmit = async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const name = document.getElementById('name').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, username, password })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/';
        } else {
          errEl.textContent = data.error || 'Could not create account. Please try again.';
          errEl.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      } catch {
        errEl.textContent = 'Connection error. Make sure the app is running.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    };
  </script>
</body>
</html>
